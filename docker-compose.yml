version: "3.9"

services:
  # ChromaDB in-process (PersistentClient) is used by default in this project.
  # If you prefer a standalone server, use the image below:
  # chromadb:
  #   image: chromadb/chroma:latest
  #   container_name: rag_chroma
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./data/chroma_db:/chroma/chroma
  #   restart: unless-stopped

  api:
    build: .
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/app.py
    container_name: rag_ui
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
