# ============================================================
# RAG Stock Market System — Master Configuration
# ============================================================

app:
  name: "RAG Stock Market Intelligence"
  version: "1.0.0"
  log_level: "INFO"

# ---------- Database ----------
database:
  host: "localhost"
  port: 5432
  name: "rag_stockmarket"
  user: "rag_user"
  password: "rag_password"
  pool_size: 5

# ---------- Embedding ----------
embedding:
  model_name: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 64
  device: "cpu"            # "cpu" | "cuda"

# ---------- Chunking ----------
chunking:
  chunk_size: 700
  chunk_overlap: 100
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "

# ---------- Retrieval ----------
retrieval:
  vector_top_k: 20
  fts_top_k: 20
  final_top_k: 5
  vector_weight: 0.6
  fts_weight: 0.4
  similarity_threshold: 0.3

# ---------- Re-ranker ----------
reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  batch_size: 32
  device: "cpu"

# ---------- LLM / Generator ----------
generator:
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 1024
  system_prompt: |
    You are a financial news analyst. Answer questions using ONLY the
    provided context. Cite every claim with [Source N]. If the context
    is insufficient, say "I don't have enough information."

# ---------- Guardrails ----------
guardrails:
  allowed_topics:
    - "stock market"
    - "finance"
    - "investing"
    - "trading"
    - "economy"
    - "earnings"
    - "market analysis"
  max_query_length: 500
  block_pii: true

# ---------- LangGraph Agent ----------
agent:
  max_retries: 2
  relevance_threshold: 0.5

# ---------- Dataset ----------
dataset:
  name: "XA7-stock-market-news"
  source: "huggingface"
  hf_repo: "Lettria/XA7-stock-market-news"
  split: "train"

# ---------- Evaluation ----------
evaluation:
  metrics:
    - "faithfulness"
    - "answer_relevancy"
    - "context_precision"
    - "context_recall"
  sample_size: 50
